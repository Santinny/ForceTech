<script>
        // Micro-interactions for quantity controls
        document.querySelectorAll('.neomorphic-inset').forEach(control => {
            const buttons = control.querySelectorAll('button');
            const span = control.querySelector('span');
            
            buttons[0].addEventListener('click', () => {
                let val = parseInt(span.innerText);
                if(val > 1) span.innerText = (val - 1).toString().padStart(2, '0');
            });

            buttons[1].addEventListener('click', () => {
                let val = parseInt(span.innerText);
                span.innerText = (val + 1).toString().padStart(2, '0');
            });
        });
    </script>
